name: Release Host Bundle

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag, e.g. v1.0.0. Tag is created by this workflow.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate + resolve version
        id: ver
        run: |
          tag="${{ inputs.version }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid version '$tag' — expected vMAJOR.MINOR.PATCH[-prerelease]" >&2
            exit 1
          fi
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1 \
             || git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Build host bundle
        run: npm run host:build

      - name: Strip sourcemaps from release artefact
        run: rm -f host/dist/*.map

      - name: Stamp version
        run: echo "${{ steps.ver.outputs.tag }}" > host/dist/version.txt

      - name: Pack ZIP
        run: |
          cd host/dist
          zip -r "../../monaco-host-${{ steps.ver.outputs.tag }}.zip" .

      - name: SHA256 checksum
        run: |
          sha256sum "monaco-host-${{ steps.ver.outputs.tag }}.zip" \
            | tee "monaco-host-${{ steps.ver.outputs.tag }}.zip.sha256"

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            monaco-host-${{ steps.ver.outputs.tag }}.zip
            monaco-host-${{ steps.ver.outputs.tag }}.zip.sha256
