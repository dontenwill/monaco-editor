name: Release Host Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0). Will be created if missing.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Build host bundle
        run: npm run host:build

      - name: Strip sourcemaps from release artefact
        run: rm -f host/dist/*.map

      - name: Stamp version
        run: echo "${{ steps.ver.outputs.tag }}" > host/dist/version.txt

      - name: Pack ZIP
        run: |
          cd host/dist
          zip -r "../../monaco-host-${{ steps.ver.outputs.tag }}.zip" .

      - name: SHA256 checksum
        run: |
          sha256sum "monaco-host-${{ steps.ver.outputs.tag }}.zip" \
            | tee "monaco-host-${{ steps.ver.outputs.tag }}.zip.sha256"

      - name: Create or update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          generate_release_notes: true
          files: |
            monaco-host-${{ steps.ver.outputs.tag }}.zip
            monaco-host-${{ steps.ver.outputs.tag }}.zip.sha256
